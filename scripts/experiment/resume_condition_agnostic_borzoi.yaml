# @package _global_
# Warm-start resume of condition-agnostic-5719240/checkpoint-3000.
# Loaded as an experiment config via +experiment=resume_condition_agnostic_borzoi
# after adding scripts/ to the Hydra search path (see resume_condition_agnostic_slurm.sh).
#
# Warm-start rationale:
#   init_weights_from_checkpoint loads model weights only — optimizer and scheduler
#   are reset.  The original run used lr=5e-4/bb=5e-6 with cosine decay over 10000
#   steps; at step 3000 the effective LRs were ~4e-4 / ~4e-6.  Starting a fresh Adam
#   at those levels would be too aggressive (no accumulated second moments), so LRs
#   are reduced to 40% of the original peak (2e-4 / 2e-6) with a 100-step warmup.
#   max_steps=8000 gives a full cosine cycle covering the remaining budget + margin.
#   checkpoint_every_n_steps halved to 500 so a walltime kill loses at most ~30 min.

defaults:
  - override /backbone: borzoi
  - override /head: transfer_mlp
  - override /loss: poisson_multinomial

data:
  streaming: true
  enable_rc_aug: false

model:
  use_track_metadata: false
  share_condition_base_channels: false

trainer:
  batch_size: 12
  eval_batch_size: 12
  num_workers: 6
  learning_rate: 2.0e-4
  backbone_learning_rate: 2.0e-6
  weight_decay: 1.0e-2
  scheduler: cosine
  warmup_steps: 100
  max_steps: 8000
  gradient_accumulation_steps: 1
  mixed_precision: bf16
  gradient_clip_norm: 1.0
  log_every_n_steps: 10
  eval_every_n_steps: 500
  checkpoint_every_n_steps: 500
  freeze_backbone: true
  unfreeze_backbone_stages_from_output_end: 2
  report_to: [wandb]
  metric_for_best_model: eval_loss
  greater_is_better: false
  init_weights_from_checkpoint: /home/a/asmith/project_milne_group/software/Regulonado/outputs/train/condition-agnostic-5719240/checkpoint-3000
